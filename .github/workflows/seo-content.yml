name: SEO Content — täglich 1 Artikel (idempotent, self-healing)

# Self-healing daily content engine.
# The generator (scripts/generate-articles.mjs) is now IDEMPOTENT: it publishes
# at most one post per Europe/Berlin day, and only if today has none yet. So it
# no longer matters exactly WHEN a run fires — we trigger several times a day and
# the first run with no post-for-today publishes; every later run that day is a
# cheap no-op (npm install + one Supabase check, then exit).
#
# Why several triggers: GitHub Actions frequently delays or silently drops a
# single scheduled cron under load. Firing 4× spreads the risk — as long as ANY
# one fires, the day self-heals. Times are UTC (GitHub cannot follow DST); the
# idempotent guard means the Berlin clock-hour is irrelevant.
on:
  schedule:
    - cron: '17 5 * * *'    # 07:17 Berlin — primary (off top-of-hour)
    - cron: '37 6 * * *'    # 08:37 Berlin — second attempt, before the 09:09 Berlin watchdog
    - cron: '23 11 * * *'   # ~13:23 Berlin — midday backstop
    - cron: '47 14 * * *'   # ~16:47 Berlin — afternoon backstop
  workflow_dispatch:               # allow manual runs from the Actions tab
    inputs:
      count:
        description: "How many articles to generate this run"
        default: "1"
      force:
        description: "Ignore the idempotent one-per-day guard (true/false)"
        default: "false"

concurrency:
  group: seo-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allows the job to commit + push articles
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install @anthropic-ai/sdk @supabase/supabase-js googleapis

      - name: Generate + gate articles
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ARTICLE_COUNT: ${{ github.event.inputs.count || '1' }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
          PUBLISH_STATE: live
          MODEL: claude-sonnet-4-6
        run: node scripts/generate-articles.mjs

      - name: Commit + push published articles
        if: steps.gen.outputs.published == 'true'
        run: |
          git config user.name  "firmadeal-content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add -A
          git commit -m "content: ${{ steps.gen.outputs.slugs }} [auto]"
          git push

      - name: Wait for Vercel deploy
        if: steps.gen.outputs.published == 'true'
        run: sleep 120     # give Vercel time to build the new pages before pinging Google

      - name: Submit sitemap + new URLs to Google Search Console
        if: steps.gen.outputs.published == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: "sc-domain:firmadeal.de"
          SITE_ORIGIN: "https://www.firmadeal.de"
          NEW_URLS: ${{ steps.gen.outputs.urls }}
        run: node scripts/gsc-submit.mjs
